# Render Blueprint for the Express API.
# In the Render dashboard: New → Blueprint → point at this repo.
# Set the secret env vars (JWT_SECRET, RAZORPAY_*, SMTP_*, MONGODB_URI) in the UI.
services:
  - type: web
    name: aarogya-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
