# Render Blueprint for the Express API.
# In the Render dashboard: New → Blueprint → point at this repo.
# Render injects PORT automatically; fill the sync:false secrets in the UI
# (MONGODB_URI = your Atlas URI; CLIENT_URL = your Vercel URL once it exists).
services:
  - type: web
    name: aarogya-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
